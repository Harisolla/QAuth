databases:
  - name: q-auth-db
    plan: free
    databaseName: qauth_db
    user: qauth_user

services:
  - type: web
    name: q-auth-platform
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: q-auth-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://q-auth-platform.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://q-auth-platform.onrender.com"
